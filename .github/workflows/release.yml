name: Build & Release

on:
  push:
    branches:
      - main
    paths:
      - 'ai-ischat.php'
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and release plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from plugin header
        id: version
        run: |
          VERSION=$(grep -m1 'Version:' ai-ischat.php | awk '{print $NF}' | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git rev-parse "refs/tags/v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.tag_check.outputs.exists == 'false' && github.ref_type == 'branch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build blocks
        run: npm run build

      - name: Create plugin ZIP
        run: |
          mkdir -p /tmp/ai-ischat
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='src' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='*.zip' \
            --exclude='.DS_Store' \
            . /tmp/ai-ischat/
          cd /tmp
          zip -r ai-ischat.zip ai-ischat/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          tag_name: "v${{ steps.version.outputs.version }}"
          body: |
            ## IsChat WordPress Plugin v${{ steps.version.outputs.version }}

            ### Installation
            1. Download `ai-ischat.zip` below
            2. Go to **Plugins → Add New → Upload Plugin**
            3. Upload the ZIP and activate

            ### Changelog
            See commit history for details.
          files: /tmp/ai-ischat.zip
          fail_on_unmatched_files: true
